<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
        
        :root {
            --crimson: #991b1b;
            --terminal-gray: #666;
            --terminal-off-white: #eee;
        }

        body { 
            font-family: 'Space Mono', monospace; 
            background-color: #050505;
            color: var(--terminal-gray);
            overflow: hidden; /* Locked until boot finishes */
        }

        /* CRT Scanline */
        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
            opacity: 0.3;
        }

        /* Rapid POST Sequence Overlay */
        #boot-screen {
            position: fixed;
            inset: 0;
            background: #050505;
            z-index: 500;
            padding: 2rem;
            font-size: 11px;
            color: #444;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: opacity 0.4s ease;
        }

        .post-line {
            line-height: 1.4;
            white-space: nowrap;
        }

        /* Typewriter Animation */
        .typewriter-line {
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            opacity: 0;
        }

        .typing {
            animation: typing-anim 0.8s steps(30, end) forwards;
            opacity: 1;
        }

        @keyframes typing-anim {
            from { width: 0 }
            to { width: 100% }
        }

        /* Link Styling */
        .link-item {
            border-bottom: 1px solid #1a1a1a;
            transition: all 0.2s ease;
            cursor: pointer;
            display: inline-block;
        }

        .link-item:hover {
            color: var(--terminal-off-white);
            border-bottom-color: var(--crimson);
            padding-left: 8px;
        }

        /* Widgets */
        .widget-box {
            position: fixed;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #1a1a1a;
            padding: 10px;
            font-size: 9px;
            z-index: 30;
            color: #444;
            width: calc(100% - 2rem);
            left: 1rem;
            opacity: 0;
            transition: opacity 1s ease;
        }

        @media (min-width: 768px) {
            .widget-box { width: 240px; left: auto; right: 2rem; }
            .diag-box { top: 2rem; }
            .audio-box { top: 18rem; }
        }

        @media (max-width: 767px) {
            .diag-box { bottom: 13rem; }
            .audio-box { bottom: 2rem; }
        }

        .widget-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 0.25rem;
        }

        .widget-title { color: var(--crimson); font-weight: bold; }
        .progress-container { width: 100%; height: 2px; background: #1a1a1a; margin: 8px 0; cursor: pointer; position: relative; }
        .progress-bar { height: 100%; background: var(--crimson); width: 0%; }
        .audio-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .audio-btn { background: none; border: none; color: #444; cursor: pointer; padding: 0; transition: color 0.2s; }
        .audio-btn:hover { color: var(--terminal-off-white); }
    </style>
</head>
<body class="p-8 md:p-24 pb-72 md:pb-24">

    <div id="boot-screen"></div>
    <div class="scanline"></div>

    <div class="widget-box diag-box" id="diag-widget">
        <div class="widget-header">
            <span class="widget-title">SYS_DIAG</span>
            <span id="uptime">UP: 00:00:00</span>
        </div>
        <div id="diag-logs" class="space-y-1 h-32 overflow-hidden opacity-60"></div>
        <div class="mt-2 pt-1 border-t border-[#1a1a1a] flex justify-between">
            <span>CPU: <span id="cpu-load">02%</span></span>
            <span>MEM: 1.4GB</span>
        </div>
    </div>

    <div class="widget-box audio-box" id="audio-widget">
        <div class="widget-header">
            <span class="widget-title">AUDIO_MODULE</span>
            <span id="track-index">01/01</span>
        </div>
        <div class="mb-1 truncate text-white opacity-80" id="track-name">NO_MEDIA_LOADED</div>
        <div class="progress-container" id="progress-area">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="flex justify-between items-center text-[8px] opacity-40">
            <span id="current-time">0:00</span>
            <span id="total-duration">0:00</span>
        </div>
        <div class="audio-controls">
            <button class="audio-btn" id="prev-btn">PREV</button>
            <button class="audio-btn font-bold text-white" id="play-btn">PLAY</button>
            <button class="audio-btn" id="next-btn">NEXT</button>
            <button class="audio-btn" id="mute-btn">MUTE</button>
            <button class="audio-btn" id="shuffle-btn">SHFL</button>
        </div>
        <audio id="main-audio" preload="metadata"></audio>
    </div>

    <main id="app-content" class="max-w-2xl relative z-20 opacity-0">
        <header class="mb-20">
            <div class="flex items-center gap-3 mb-4 typewriter-line" data-delay="0">
                <div class="w-2 h-2 bg-red-800 rounded-full shadow-[0_0_8px_#991b1b] animate-pulse"></div>
                <h1 class="text-white text-xl tracking-tighter">ARCHIVE_01</h1>
            </div>
            <p class="text-sm leading-relaxed max-w-md italic typewriter-line" data-delay="800">
                A collection of digital artifacts and logs.
            </p>
        </header>

        <section class="space-y-12">
            <div class="group typewriter-line" data-delay="1600">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest">01 / Utilities</span>
                <a href="utilities.html" target="_blank" rel="noopener noreferrer" class="link-item w-full block py-2 text-lg">Web Tools</a>
            </div>

            <div class="group typewriter-line" data-delay="2400">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest">02 / Documentation</span>
                <a href="#" class="link-item w-full block py-2 text-lg">Writings</a>
            </div>

            <div class="group typewriter-line" data-delay="3200">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest">03 / Visuals</span>
                <a href="galleries.html" class="link-item w-full block py-2 text-lg">Gallery</a>
            </div>

            <div class="group typewriter-line" data-delay="4000">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest">04 / Network</span>
                <div class="flex items-center gap-6">
                    <a href="https://steamcommunity.com/id/Jiwt/" target="_blank" class="link-item py-2 text-sm">Steam</a>
                    <a href="https://www.twitch.tv/jiwt" target="_blank" class="link-item py-2 text-sm">Twitch</a>
                </div>
            </div>
        </section>

        <footer class="mt-32 pt-8 border-t border-[#111] typewriter-line" data-delay="4800">
            <p class="text-[10px] uppercase tracking-widest opacity-20">
                Connection established. End of line.
            </p>
        </footer>
    </main>

    <script>
        const bootData = [
            "Initializing BIOS...", "Verifying CPU...", "Memory Test: 16384MB OK",
            "SATA Primary Master: 500GB SSD", "SATA Secondary Master: NONE",
            "USB Controller Initialized...", "Network Card Found [MAC: 00:1A:2B:3C:4D:5E]",
            "DHCP Handshake... OK", "Loading Kernel ARCH_OS_01...", "Mounting /dev/sda1...",
            "Setting up Security Protocols...", "Encryption Layer: AES-256 Enabled",
            "Checking Archive Integrity...", "Checksum 0xAF43... PASSED",
            "Loading UI Assets...", "Starting Media Engine...", "Redirecting I/O...",
            "SUCCESS: System Boot Sequence Complete."
        ];

        function runPostSequence() {
            const screen = document.getElementById('boot-screen');
            let count = 0;
            
            // Rapid-fire lines every 50ms (Approx 1 second for total list)
            const interval = setInterval(() => {
                if (count < bootData.length) {
                    const line = document.createElement('div');
                    line.className = 'post-line';
                    line.innerText = `[ OK ] ${bootData[count]}`;
                    screen.appendChild(line);
                    screen.scrollTop = screen.scrollHeight;
                    count++;
                } else {
                    clearInterval(interval);
                    setTimeout(revealSite, 300);
                }
            }, 50);
        }

        function revealSite() {
            const screen = document.getElementById('boot-screen');
            const main = document.getElementById('app-content');
            
            screen.style.opacity = '0';
            setTimeout(() => {
                screen.remove();
                document.body.style.overflow = 'auto';
                main.style.opacity = '1';
                
                // Trigger Typewriters
                document.querySelectorAll('.typewriter-line').forEach(line => {
                    setTimeout(() => line.classList.add('typing'), parseInt(line.getAttribute('data-delay')));
                });

                // Show Widgets
                document.getElementById('diag-widget').style.opacity = '1';
                document.getElementById('audio-widget').style.opacity = '1';
            }, 400);
        }

        /** Media & Diag Logic **/
        const audioTracks = [{ name: "JFMAMJJASOND", url: "audio/03 JFMAMJJASOND.mp3" }, { name: "A PARTRIDGE & A PEAR TREE", url: "audio/02. A Partridge & A Pear Tree.mp3" }, { name: "WINGARIUM LEVIOSA", url: "audio/06 Wingarium Leviosa.mp3" }, { name: "DNA SWAB", url: "audio/06. DNA Swab.mp3" }, { name: "LONG TIME", url: "audio/10. Long Time.mp3" }, { name: "MARIO LEMIEUXX", url: "audio/01 Mario Lemieuxx.mp3" }, { name: "RALE BULGARIAN", url: "audio/01. Rale Bulgarian.mp3" }, { name: "FROMAJ", url: "audio/02 Fromaj.mp3" }];
        let currentTrackIndex = 0;
        const mainAudio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');
        const trackName = document.getElementById('track-name');
        const trackIndexDisplay = document.getElementById('track-index');
        const progressBar = document.getElementById('progress-bar');

        function loadTrack(index) {
            if(!audioTracks[index]) return;
            mainAudio.src = encodeURI(audioTracks[index].url);
            trackName.innerText = audioTracks[index].name.toUpperCase();
            trackIndexDisplay.innerText = `${(index + 1).toString().padStart(2, '0')}/${audioTracks.length.toString().padStart(2, '0')}`;
            mainAudio.load();
        }

        playBtn.onclick = async () => {
            if (mainAudio.paused) { await mainAudio.play(); playBtn.innerText = "PAUSE"; }
            else { mainAudio.pause(); playBtn.innerText = "PLAY"; }
        };

        mainAudio.ontimeupdate = () => {
            if (isNaN(mainAudio.duration)) return;
            progressBar.style.width = `${(mainAudio.currentTime / mainAudio.duration) * 100}%`;
        };

        document.getElementById('next-btn').onclick = () => { currentTrackIndex = (currentTrackIndex + 1) % audioTracks.length; loadTrack(currentTrackIndex); mainAudio.play(); playBtn.innerText = "PAUSE"; };
        document.getElementById('prev-btn').onclick = () => { currentTrackIndex = (currentTrackIndex - 1 + audioTracks.length) % audioTracks.length; loadTrack(currentTrackIndex); mainAudio.play(); playBtn.innerText = "PAUSE"; };

        window.addEventListener('DOMContentLoaded', () => {
            runPostSequence();
            loadTrack(0);

            // Background Diag simulation
            let startTime = Date.now();
            setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
                const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
                const s = String(elapsed % 60).padStart(2, '0');
                document.getElementById('uptime').innerText = `UP: ${h}:${m}:${s}`;
                document.getElementById('cpu-load').innerText = `${Math.floor(Math.random() * 8 + 1).toString().padStart(2, '0')}%`;
            }, 1000);

            setInterval(() => {
                const log = document.createElement('div');
                log.innerText = `> ${["INIT_CORE", "QUERY_DB", "AUTH_GRNT", "STATUS_OK"][Math.floor(Math.random()*4)]}`;
                const container = document.getElementById('diag-logs');
                container.prepend(log);
                if (container.children.length > 8) container.removeChild(container.lastChild);
            }, 3000);
        });
    </script>
</body>
</html>
